<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Catastro Ágil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .tech-bg-animated {
            background-color: #0f172a;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(6, 182, 212, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15) 0%, transparent 40%);
            background-size: 200% 200%;
            animation: gradientMovement 15s ease infinite;
        }
        @keyframes gradientMovement {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }
        .animate-spin-slow { animation: spin 15s linear infinite; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="tech-bg-animated min-h-screen flex flex-col items-center justify-center text-slate-200 p-4">

    <div class="glass-panel w-full max-w-md p-8 rounded-2xl shadow-2xl border border-white/10">
        
        <div class="text-center mb-8">
            <div class="flex justify-center items-center gap-6 mb-4">
                <i class="fa-solid fa-house text-cyan-400 text-3xl drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]"></i>
                <i class="fa-solid fa-earth-americas text-blue-400 text-3xl animate-spin-slow drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]"></i>
            </div>
            <h1 class="text-2xl font-black uppercase tracking-widest text-white">CATASTRO <span class="text-cyan-400">ÁGIL</span></h1>
            <p class="text-slate-400 text-xs mt-2 font-mono">Bóveda de Resguardo Territorial</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Correo Electrónico</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-3 top-3.5 text-slate-500 text-sm"></i>
                    <input type="email" id="email" required placeholder="ejemplo@dominio.com" class="w-full bg-slate-950/50 border border-slate-700 rounded-lg pl-9 pr-3 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-xs font-bold uppercase text-slate-400">Clave de Acceso</label>
                    <a href="#" class="text-[10px] text-cyan-400 hover:underline">¿Olvidó su clave?</a>
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-3.5 text-slate-500 text-sm"></i>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full bg-slate-950/50 border border-slate-700 rounded-lg pl-9 pr-3 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition">
                </div>
            </div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-black uppercase tracking-wider py-3 rounded-lg shadow-[0_0_15px_rgba(6,182,212,0.3)] transition active:scale-95 flex justify-center items-center gap-2 text-sm mt-2">
                <i class="fa-solid fa-fingerprint"></i> Autenticar Acceso
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-slate-800 text-center">
            <button onclick="toggleModal(true)" class="text-xs text-cyan-400 hover:underline">
                <i class="fa-solid fa-user-plus mr-1"></i> ¿Cliente nuevo? Registrarse aquí
            </button>
        </div>
    </div>

    <div id="registerModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-md p-6 rounded-2xl text-white space-y-4 shadow-2xl">
            <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                <h3 class="font-bold text-lg text-cyan-400"><i class="fa-solid fa-user-plus mr-2"></i>Nuevo Registro</h3>
                <button onclick="toggleModal(false)" class="text-slate-400 hover:text-white text-xl">&times;</button>
            </div>
            <form id="registerForm" class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Cédula</label>
                    <input type="text" id="regCedula" required pattern="[0-9]+" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:border-cyan-400 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Nombre Completo</label>
                    <input type="text" id="regNombre" required class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:border-cyan-400 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Correo Electrónico</label>
                    <input type="email" id="regEmail" required placeholder="correo@dominio.com" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:border-cyan-400 outline-none">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 font-bold py-2 rounded-lg text-sm mt-3 transition">
                    Guardar Cliente en Bóveda
                </button>
            </form>
        </div>
    </div>

    <div class="fixed bottom-6 text-center w-full">
        <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">
            Sistema de Resguardo Territorial v1.0.0 &copy; 2026
        </p>
    </div>

    <script>
        function validarCorreoEstricto(correo) {
            const regex = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.com$/;
            return regex.test(correo);
        }

        function toggleModal(show) {
            document.getElementById('registerModal').classList.toggle('hidden', !show);
        }

        // Tus funciones de login y registro siguen igual...
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!validarCorreoEstricto(email)) {
                alert("❌ ACCESO DENEGADO: Formato de correo inválido.");
                return;
            }
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    localStorage.setItem('usuario_id', data.usuario_id);
                    localStorage.setItem('usuario_nombre', data.nombre);
                    window.location.href = 'index.html';
                } else {
                    alert("❌ ERROR: " + data.message);
                }
            } catch (err) {
                alert("Error de conexión.");
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const cedula = document.getElementById('regCedula').value.trim();
            const nombre = document.getElementById('regNombre').value.trim();
            const email = document.getElementById('regEmail').value.trim();

            if (!validarCorreoEstricto(email)) {
                alert("❌ REGISTRO DENEGADO: El correo debe terminar en '.com'.");
                return;
            }
            try {
                const res = await fetch('/api/registrar-cliente', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ cedula, nombre, email })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    alert("✅ ¡Cliente registrado!");
                    toggleModal(false);
                } else {
                    alert("❌ ERROR: " + data.message);
                }
            } catch (err) {
                alert("Error de red.");
            }
        });
    </script>
</body>
</html>
